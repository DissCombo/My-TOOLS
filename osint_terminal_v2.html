
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .terminal { background: #0d0d0d; border-radius: 10px; border: 1px solid #333; font-family: 'Courier New', monospace; overflow: hidden; }
  .titlebar { background: #1a1a1a; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #333; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
  .titlebar-text { color: #888; font-size: 13px; margin: 0 auto; }
  .screen { padding: 16px; }
  .line { color: #00ff41; font-size: 12px; line-height: 1.75; }
  .line.dim{color:#555}.line.info{color:#5af}.line.warn{color:#fa0}.line.err{color:#f55}.line.head{color:#0f9;font-weight:bold}.line.white{color:#ddd}
  .mode-bar { display: flex; gap: 5px; margin: 10px 0 8px; flex-wrap: wrap; }
  .mode-btn { background: #1a1a1a; border: 1px solid #333; color: #888; font-family: 'Courier New', monospace; font-size: 11px; padding: 4px 9px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .mode-btn:hover { border-color: #00ff41; color: #00ff41; }
  .mode-btn.active { background: #00ff4122; border-color: #00ff41; color: #00ff41; }
  .input-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .prompt { color: #00ff41; font-size: 12px; white-space: nowrap; }
  .cmd-input { background: transparent; border: none; outline: none; color: #00ff41; font-family: 'Courier New', monospace; font-size: 12px; flex: 1; caret-color: #00ff41; }
  .run-btn { background: #00ff4122; border: 1px solid #00ff41; color: #00ff41; font-family: 'Courier New', monospace; font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
  .run-btn:hover { background: #00ff4133; }
  .separator { border: none; border-top: 1px solid #1e1e1e; margin: 8px 0; }
  .tool-link { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
  .tool-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; min-width: 66px; text-align: center; background: #00ff4118; color: #00ff41; border: 1px solid #00ff4144; white-space: nowrap; }
  .tool-badge.blue{background:#5af2;color:#5af;border-color:#5af4}
  .tool-badge.amber{background:#fa02;color:#fa0;border-color:#fa04}
  .tool-badge.pink{background:#f5a2;color:#f5a;border-color:#f5a4}
  .tool-badge.red{background:#f552;color:#f85;border-color:#f554}
  .tool-badge.teal{background:#0fa2;color:#0fa;border-color:#0fa4}
  .open-link { color: #5af; font-size: 11px; text-decoration: none; font-family: 'Courier New', monospace; border: 1px solid #5af4; padding: 1px 7px; border-radius: 3px; margin-left: auto; white-space: nowrap; }
  .open-link:hover { background: #5af2; }
  .output-box { max-height: 420px; overflow-y: auto; margin-top: 6px; }
  .output-box::-webkit-scrollbar{width:4px}.output-box::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .section-header { color: #fa0; font-size: 11px; margin: 10px 0 4px; letter-spacing: 1px; }
  .tool-desc { color: #444; font-size: 10px; padding-left: 78px; margin-bottom: 4px; }
  .summary-bar { display: flex; gap: 10px; margin: 6px 0; flex-wrap: wrap; }
  .summary-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid #333; color: #888; }
</style>

<div class="terminal">

  </div>
  <div class="screen">

    <hr class="separator">
    <div class="line white">Select lookup mode:</div>
    <div class="mode-bar" id="modeBar">

    <div class="output-box" id="output">

  </div>
</div>

let currentMode = "username";

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    const m = modes[currentMode];
    document.getElementById('promptLabel').textContent = m.label;
    document.getElementById('queryInput').placeholder = m.placeholder;
    document.getElementById('output').innerHTML = '<div class="line dim">// Mode: ' + currentMode.toUpperCase() + '. Enter target and press RUN.</div>';
  });
});

function runLookup() {
  const q = document.getElementById('queryInput').value.trim();
  const out = document.getElementById('output');
  if (!q) { out.innerHTML = '<div class="line err">[-] Error: no target specified.</div>'; return; }
  const m = modes[currentMode];
  const totalTools = m.sections.reduce((a, s) => a + s.tools.length, 0);

  let html = `<div class="line info">[*] Target: <span style="color:#fff">${q}</span></div>`;
  html += `<div class="line info">[*] Mode: ${currentMode.toUpperCase()} — ${totalTools} tools across ${m.sections.length} categories</div>`;
  html += `<div class="summary-bar">`;
  m.sections.forEach(s => {
    html += `<span class="summary-pill">${s.title.replace(/[\[\]]/g,'')} (${s.tools.length})</span>`;
  });
  html += `</div><hr class="separator">`;

  m.sections.forEach(s => {
    html += `<div class="section-header">${s.title}</div>`;
    s.tools.forEach(t => {
      const url = t.url(q);
      html += `<div class="tool-link">
        <span class="tool-badge ${t.cls}">${t.badge}</span>
        <span class="line white" style="font-size:12px">${t.name}</span>
        <a class="open-link" href="${url}" target="_blank">↗ Open</a>
      </div>
      <div class="tool-desc">${t.desc}</div>`;
    });
  });

  html += `<hr class="separator">`;
  html += `<div class="line" style="color:#00ff41">[+] ${totalTools} tools loaded. Click [↗ Open] to launch each one.</div>`;
  html += `<div class="line dim" style="font-size:10px; margin-top:3px;">[!] CLI tools (Sherlock, GHunt, PhoneInfoga) require local install — links open GitHub.</div>`;
  out.innerHTML = html;
  out.scrollTop = 0;
}

document.getElementById('runBtn').addEventListener('click', runLookup);
document.getElementById('queryInput').addEventListener('keydown', e => { if (e.key === 'Enter') runLookup(); });
